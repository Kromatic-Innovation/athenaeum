name: Release

# Actions pinned to full commit SHAs (not mutable tags). A compromised
# maintainer of any upstream action can retag `v4`/`release/v1`/etc. and
# push malicious code into our next release, which our trusted-publishing
# identity would then happily sign. SHA pins make action content
# immutable — upgrades are explicit PRs, not silent.
# Comment after each pin records the semver tag the SHA corresponded to
# at pin time, for human-readable version tracking.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # for PEP 740 build-provenance attestations
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$proj" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) does not match pyproject.toml version ($proj)"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/athenaeum
    permissions:
      id-token: write          # OIDC exchange with PyPI + attestation signing
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      # pypa/gh-action-pypi-publish is a Docker container action. The
      # container image at `ghcr.io/pypa/gh-action-pypi-publish:<tag>` is
      # keyed by semver tag, not commit SHA — pinning the action at a SHA
      # (as we do for the JS-based actions above) causes the Docker pull
      # to 404 with "manifest unknown". We therefore pin by a specific
      # semver tag. That tag is still a mutable ref, but the tradeoff is
      # acceptable here: pypa is a first-party trusted publisher, and
      # the OIDC exchange with PyPI verifies both the repo and the
      # workflow ref at publish time. See v0.2.1 release attempt (run
      # 24582826878) for the failure mode this comment documents.
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          # PEP 740 attestations — publisher mints a sigstore bundle,
          # PyPI stores it, downstream consumers can
          # `gh attestation verify` the wheel.
          attestations: true

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the release for the pushed tag
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Extract CHANGELOG section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md section found for [$version]; falling back to a CHANGELOG link"
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." > release-notes.md
          fi

      # Idempotent: the next release may be cut manually with
      # `gh release create` before this job runs — if a release already
      # exists for the tag, skip cleanly instead of failing or duplicating.
      - name: Create GitHub Release (skip if it already exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
