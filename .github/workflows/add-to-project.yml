name: Add to Internal Platform project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to Internal Platform project
    runs-on: ubuntu-latest
    # Project-board insertion is operational hygiene, not a code-quality gate.
    # The kromatic-ci-workflow-bot App cannot write to Projects v2 boards
    # (Projects v2 access is independent of org-level App permissions;
    # verified — see Kromatic-Innovation/kromatic-project#55 / Kromatic-Innovation/code-workspace-config#406).
    # This job fails on every PR; continue-on-error stops it from blocking.
    # Issues are added to Project boards via Occam orchestrator instead
    # (Kromatic-Innovation/code-workspace-config#418).
    continue-on-error: true
    steps:
      - name: Load workflow-bot App credentials from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          KROMATIC_WORKFLOW_BOT_APP_ID: op://Infrastructure/kromatic-workflow-bot/app-id
          KROMATIC_WORKFLOW_BOT_PRIVATE_KEY: op://Infrastructure/kromatic-workflow-bot/private-key

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.KROMATIC_WORKFLOW_BOT_APP_ID }}
          private-key: ${{ env.KROMATIC_WORKFLOW_BOT_PRIVATE_KEY }}

      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Kromatic-Innovation/projects/4
          github-token: ${{ steps.app-token.outputs.token }}
