name: CI

# Third-party actions pinned to full commit SHAs for supply-chain hygiene.
# Semver-tag comment after each pin records the release the SHA maps to at
# pin time. Keep in sync with release.yml pins.
#
# CI runs on develop only (PR + push). `main` never runs its own CI: it is
# fast-forward-promoted from develop by promote-main.yml, which re-verifies
# the required check-runs on the promoted SHA before pushing the ref update.
# Since `main`'s tip is always the same commit SHA that develop already
# tested, an independent main-triggered run would be a pure duplicate of
# the develop run (code-workspace-config#900 CI-bill audit).

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with vector extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,vector]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=athenaeum --cov-report=term-missing --cov-fail-under=75
