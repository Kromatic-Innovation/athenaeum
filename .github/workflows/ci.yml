name: CI

# Third-party actions pinned to full commit SHAs for supply-chain hygiene.
# Semver-tag comment after each pin records the release the SHA maps to at
# pin time. Keep in sync with release.yml pins.
#
# CI runs on develop only (PR + push). `main` never runs its own CI: it is
# fast-forward-promoted from develop by promote-main.yml, which re-verifies
# the required check-runs on the promoted SHA before pushing the ref update.
# Since `main`'s tip is always the same commit SHA that develop already
# tested, an independent main-triggered run would be a pure duplicate of
# the develop run (code-workspace-config#900 CI-bill audit).

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with vector extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,vector]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=athenaeum --cov-report=term-missing --cov-fail-under=75

  # hestia#557 — a single, always-present aggregate status that is intended to
  # be the ONE required check on develop/main. It runs on every event
  # (`if: always()`) so it reports a concrete conclusion even when the real
  # `test` job is legitimately skipped. Making the matrix `test` job itself
  # required would name per-leg checks (`test (3.11)` …) and would wedge on a
  # legitimately skipped run, since a *skipped* job never satisfies a required
  # check. This synthesized gate is green exactly when the test matrix is truly
  # green OR was skipped.
  ci-required:
    name: CI Required
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate CI result
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "test=$TEST_RESULT"
          # `success`  → the test matrix ran and every leg passed.
          # `skipped`  → the test job was legitimately skipped.
          # anything else (failure/cancelled) → fail the gate.
          case "$TEST_RESULT" in
            success|skipped)
              echo "CI Required: green (test=$TEST_RESULT)"
              exit 0
              ;;
            *)
              echo "::error::test job result '$TEST_RESULT' is not green — failing the aggregate gate."
              exit 1
              ;;
          esac
