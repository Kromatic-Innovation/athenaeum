# --- Cases added in issue #345 (WS3) to give the floor >= 2-case slack ---
# Enlarges the set from 5 -> 8 so no single hard case sinks the whole layer.
# Two cases per action class (not_a_conflict, keep_pick_winner,
# disambiguation, propose_merge). Still 100% synthetic Meridian Advisory.

# not_a_conflict via the sequential-snapshot FACT rule (two dated snapshots
# of an evolving headcount — NOT a conflict; the older is simply stale).
- id: sequential_snapshot_headcount
  outcome_class: pass
  expected:
    action_class: not_a_conflict
  detector:
    conflict_type: factual
    rationale: "Two dated snapshots of Meridian's headcount."
    passages:
      - "As of 2026-01, Meridian has 18 staff."
      - "As of 2026-06, Meridian has 27 staff."
  members:
    - filename: reference_headcount_jan.md
      body: "As of 2026-01, Meridian has 18 staff across two offices."
      frontmatter:
        name: headcount-jan
        type: reference
        source_type: user-stated
        source_ref: "session-2026-01-15"
        updated: "2026-01-15"
    - filename: reference_headcount_jun.md
      body: "As of 2026-06, Meridian has 27 staff across three offices."
      frontmatter:
        name: headcount-jun
        type: reference
        source_type: user-stated
        source_ref: "session-2026-06-15"
        updated: "2026-06-15"

# keep_pick_winner via SOURCE PRECEDENCE (not recency). Two mutually-exclusive
# claims about the same attribute where ONE side is user-stated and the other
# is an unsourced inference — precedence decides (user > unsourced), so the
# resolver picks the winner rather than escalating a disambiguation question.
- id: precedence_user_over_unsourced_contact
  outcome_class: contradict
  expected:
    action_class: keep_pick_winner
  detector:
    conflict_type: factual
    rationale: "Two claims about Northwind's primary contact; one user-stated, one inferred."
    passages:
      - "The primary contact at client Northwind is Sam Reyes."
      - "The primary contact at client Northwind is Dana Okoro."
  members:
    - filename: reference_contact_inferred.md
      body: "The primary contact at client Northwind is Sam Reyes."
      frontmatter:
        name: northwind-contact-inferred
        type: reference
        source_type: inferred
    - filename: reference_contact_user.md
      body: >-
        The primary contact at client Northwind is Dana Okoro — Priya confirmed
        this directly in the 2026-05 account review.
      frontmatter:
        name: northwind-contact-user
        type: reference
        source_type: user-stated
        source: "user:session-2026-05-12"
        source_ref: "session-2026-05-12"
        updated: "2026-05-12"

