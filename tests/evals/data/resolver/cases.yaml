# DECISION conflict (NOT a text-declared supersession, NOT dated FACT
# snapshots). The two members disagree about which platform hosts the
# portal; the newer member records a migration DECISION but does NOT say
# "Heroku is retired/superseded/cancelled" — so the resolver must PICK the
# winner by recency/decision precedence (→ keep_b) rather than reading a
# resolution already declared in the text. Authoring rule (issue #345): a
# body that says "X is retired" fires the not_a_conflict "supersession
# declared in the text" rule, and "as of <date>, X" framing fires the
# sequential-snapshot FACT rule — both defensibly yield not_a_conflict.
# Neither is the intended keep_pick_winner outcome, so both are avoided here.
- id: decision_conflict_hosting_migration
  outcome_class: contradict
  expected:
    action_class: keep_pick_winner
  detector:
    conflict_type: prescriptive
    rationale: "Conflicting claims about which platform hosts Meridian's client portal."
    passages:
      - "Meridian's client portal runs on Heroku."
      - "Meridian migrated the client portal to Fly.io."
  members:
    - filename: project_hosting_heroku.md
      body: >-
        Meridian's client portal runs on Heroku. Priya approved the Heroku
        hosting plan and signed the invoice on 2026-02-10.
      frontmatter:
        name: hosting-heroku
        type: project
        source_type: user-stated
        source_ref: "session-2026-02-10"
        updated: "2026-02-10"
    - filename: project_hosting_fly.md
      body: >-
        Meridian migrated the client portal to Fly.io. The engineering team
        completed the cutover on 2026-05-20 for better regional latency.
      frontmatter:
        name: hosting-fly
        type: project
        source_type: user-stated
        source_ref: "session-2026-05-15"
        updated: "2026-05-20"

