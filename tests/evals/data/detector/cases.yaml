# Detector golden set (issue #331)
#
# Synthetic scenario: "Meridian Advisory", a fictional 12-person consultancy.
# Every case is invented — nothing here is drawn from a live knowledge tree.
#
# Each case is a cluster of 2 auto-memory snippets fed to
# detect_contradictions(). ``outcome_class`` is one of {pass, contradict,
# escalate} — the three classes required by the acceptance criteria.
#
# For scoring we assert on ``expected.detected`` (bool) and, when
# ``expected.conflict_type`` is set, that the reported type matches. We do
# NOT assert on rationale text.
#
# Frontmatter fields translate to fields on the AutoMemoryFile record so the
# detector prompt renders the same TRUSTED scope line real intake produces
# (source_type, source_ref, valid_from/valid_until, updated).

- id: standup_time
  outcome_class: contradict
  expected:
    detected: true
    conflict_type: factual
  members:
    - filename: feedback_standup_9am.md
      body: "Meridian's daily standup is at 9:00 AM sharp every weekday."
      frontmatter:
        name: standup-time
        type: feedback
        source_type: user-stated
        source_ref: "session-2026-03-01"
        updated: "2026-03-01"
    - filename: feedback_standup_930.md
      body: "The standup starts at 9:30 — we moved it from 9:00 last week."
      frontmatter:
        name: standup-time-updated
        type: feedback
        source_type: user-stated
        source_ref: "session-2026-03-05"
        updated: "2026-03-05"

